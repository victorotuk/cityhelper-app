<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/nava-logo-dark.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/nava-logo-dark.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/nava-logo-dark.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/nava-logo-dark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nava — Never miss a deadline</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__APP_ERROR__ = null;
      window.addEventListener('error', function(e) {
        window.__APP_ERROR__ = e;
        var root = document.getElementById('root');
        if (root && !root.querySelector('[data-error-display]')) {
          root.innerHTML = '<div data-error-display style="padding:24px;background:#0c0d12;color:#f87171;font-family:monospace;white-space:pre-wrap;font-size:12px;">Bootstrap error: ' + (e.message || '') + '\n\n' + (e.filename || '') + ':' + (e.lineno || '') + '\n\n' + (e.error && e.error.stack ? e.error.stack : '') + '</div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        window.__APP_ERROR__ = e;
        var root = document.getElementById('root');
        if (root && !root.querySelector('[data-error-display]')) {
          var msg = e.reason && e.reason.message ? e.reason.message : String(e.reason);
          var stack = e.reason && e.reason.stack ? e.reason.stack : '';
          root.innerHTML = '<div data-error-display style="padding:24px;background:#0c0d12;color:#f87171;font-family:monospace;white-space:pre-wrap;font-size:12px;">Unhandled promise: ' + msg + '\n\n' + stack + '</div>';
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
